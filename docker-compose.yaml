version: '3.8'

services:
    mysql:
        image: mysql:8.0
        container_name: studybridge_db
        restart: unless-stopped
        tty: true
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: studybridge
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - db_data:/var/lib/mysql

volumes:
    db_data:
        driver: local
